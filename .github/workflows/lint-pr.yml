name: Lint PR title

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - synchronize

permissions:
  pull-requests: write

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        id: lint_pr_title
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: marocchino/sticky-pull-request-comment@v2
        if: always() && (steps.lint_pr_title.outputs.error_message != null)
        with:
          header: pr-title-lint-error
          message: |
            PR title does not follow the [Conventional Commits](https://www.conventionalcommits.org/en/v1.0.0/) spec.

            Details:
            ```
            ${{ steps.lint_pr_title.outputs.error_message }}
            ```

            **Valid types:** `feat`, `fix`, `chore`, `docs`, `refactor`, `test`, `ci`, `perf`
            **Breaking change:** append `!` to the type, e.g. `feat!: drop Node 16`

      - uses: marocchino/sticky-pull-request-comment@v2
        if: steps.lint_pr_title.outputs.error_message == null
        with:
          header: pr-title-lint-error
          delete: true
