version: 2

updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
    groups:
      charmbracelet:
        patterns:
          - "github.com/charmbracelet/*"
      cli:
        patterns:
          - "github.com/cli/*"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    commit-message:
      prefix: ci
      include: scope
    labels:
      - dependencies
